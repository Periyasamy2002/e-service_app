{% extends 'user-base.html' %}

{% block content %}

<style>
    /* Layout Container */
    .auth-container {
        max-width: 1000px;
        margin: 50px auto;
    }

    /* Top Navigation Buttons */
    .top-nav {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 15px;
        gap: 10px;
    }

    .btn-outline {
        padding: 8px 20px;
        border: 2px solid #667eea;
        background: transparent;
        color: #667eea;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn-outline:hover {
        background: #667eea;
        color: white;
    }

    /* Main Card */
    .auth-wrapper {
        display: flex;
        background: #fff;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    }

    .form-section {
        width: 50%;
        padding: 40px;
        transition: 0.3s;
    }

    .hidden {
        display: none;
    }

    .right-section {
        width: 50%;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .btn-primary {
        width: 100%;
        padding: 12px;
        border: none;
        background: #667eea;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    /* Back Button Styling */
    .btn-back {
        display: block;
        width: 100%;
        text-align: center;
        margin-top: 20px;
        color: #888;
        text-decoration: none;
        font-size: 14px;
        background: none;
        border: none;
        cursor: pointer;
    }

    .btn-back:hover {
        color: #333;
    }

    .toggle-link {
        color: #667eea;
        cursor: pointer;
        font-weight: bold;
    }
</style>

<div class="auth-container">
    
    <div class="top-nav">
        <button class="btn-outline" onclick="showLogin()">Login</button>
        <button class="btn-outline" onclick="showRegister()">Register</button>
    </div>

    <div class="auth-wrapper">
        <div class="form-section {% if show_register %}hidden{% endif %}" id="loginBox">
            <h2>Login</h2>
            <p>Welcome back</p>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <p style="text-align: center; margin-top: 15px;">
                Don't have an account? <span class="toggle-link" onclick="showRegister()">Register</span>
            </p>

            <button onclick="history.back()" class="btn-back">← Back to Home</button>
        </div>

        <div class="form-section {% if not show_register %}hidden{% endif %}" id="registerBox">
            <h2>Create Account</h2>
            <p>Join the Service System</p>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="action" value="register">

                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="email" placeholder="Email" required>
             
                <input type="password" name="password1" placeholder="Password" required>
                <input type="password" name="password2" placeholder="Confirm Password" required>

                <button type="submit" class="btn-primary">Register</button>
            </form>

            <p style="text-align: center; margin-top: 15px;">
                Already registered? <span class="toggle-link" onclick="showLogin()">Login</span>
            </p>

            <button onclick="history.back()" class="btn-back">← Back to Home</button>
        </div>

        <div class="right-section">
            <div>
                <h2>Service System</h2>
                <p>Manage users, roles and requests easily</p>
            </div>
        </div>
    </div>
</div>

<script>
    function showRegister() {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("registerBox").classList.remove("hidden");
    }

    function showLogin() {
        document.getElementById("registerBox").classList.add("hidden");
        document.getElementById("loginBox").classList.remove("hidden");
    }
</script>

{% endblock %}
