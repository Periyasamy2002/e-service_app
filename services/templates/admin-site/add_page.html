{% extends 'admin-site/admin_base.html' %}

{% block content %}
<div class="card form-card" style="max-width: 720px; margin: 0 auto;">
    <h2>Create New Page</h2>
    <p>Fill in the details below to create a new navigation page.</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Page Title</label>
            <input type="text" name="title" placeholder="Enter page name" required>
        </div>
        <div class="form-group">
            <label>Description Content</label>
            <textarea name="description" placeholder="Enter page content" rows="10" required></textarea>
        </div>
        <button type="submit" class="btn">Create Page</button>
    </form>
</div>
{% endblock %}
