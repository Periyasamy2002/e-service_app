{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Service System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static './user-site/user-base.css' %}">
</head>
<body>
    <style>/* Reset + Base */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #f5f7fb;
    color: #333;
    line-height: 1.6;
}

/* Layout container */
.page-shell {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* ================= HEADER ================= */
.site-header {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
    animation: slideDown 0.6s ease;
}

@keyframes slideDown {
    from {
        transform: translateY(-60px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.site-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Brand */
.brand {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
}

/* Nav Links */
.nav-links a {
    margin-left: 20px;
    text-decoration: none;
    color: #fff;
    font-weight: 500;
    position: relative;
    transition: all 0.3s ease;
}

/* Hover underline animation */
.nav-links a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: -4px;
    background: #fff;
    transition: width 0.3s ease;
}

.nav-links a:hover::after {
    width: 100%;
}

.nav-links a:hover {
    opacity: 0.8;
}

/* User Dropdown */
.user-dropdown {
    position: relative;
    display: inline-block;
    margin-left: 20px;
}

.user-dropdown-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
}

.user-dropdown-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-1px);
}

.dropdown-arrow {
    font-size: 12px;
    transition: transform 0.3s ease;
}

.user-dropdown:hover .dropdown-arrow {
    transform: rotate(180deg);
}

.user-dropdown-menu {
    position: absolute;
    top: 100%;
    right: 0;
    background: white;
    min-width: 180px;
    border-radius: 8px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    z-index: 1000;
}

.user-dropdown:hover .user-dropdown-menu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.user-dropdown-menu a {
    display: block;
    padding: 12px 20px;
    color: #333;
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px solid #f0f0f0;
    transition: all 0.3s ease;
}

.user-dropdown-menu a:hover {
    background: #f8f9fa;
    color: #4f46e5;
}

.user-dropdown-menu a:last-child {
    border-bottom: none;
    color: #dc3545;
}

.user-dropdown-menu a:last-child:hover {
    background: #fee;
}

/* ================= MESSAGES ================= */
.messages {
    margin: 15px auto;
    max-width: 900px;
}

.alert {
    padding: 12px 16px;
    margin-bottom: 10px;
    border-radius: 8px;
    animation: fadeIn 0.5s ease;
}

.alert-success {
    background: #d1fae5;
    color: #065f46;
}

.alert-error {
    background: #fee2e2;
    color: #991b1b;
}

.alert-warning {
    background: #fef3c7;
    color: #92400e;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ================= CONTENT ================= */
.page-shell {
    animation: fadePage 0.6s ease;
}

@keyframes fadePage {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Card style (use in your pages) */
.card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

/* ================= BUTTON ================= */
.btn {
    display: inline-block;
    padding: 10px 18px;
    background: #4f46e5;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.3s ease;
}

.btn:hover {
    background: #4338ca;
    transform: scale(1.05);
}

/* ================= FOOTER ================= */
.footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    font-size: 14px;
    color: #666;
    border-top: 1px solid #ddd;
    animation: fadeIn 1s ease;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
    .site-nav {
        flex-direction: column;
        gap: 10px;
    }

    .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
    }

    .nav-links a {
        margin: 0;
    }

    .user-dropdown {
        margin-left: 0;
    }

    .user-dropdown-menu {
        right: auto;
        left: 50%;
        transform: translateX(-50%) translateY(-10px);
    }

    .user-dropdown:hover .user-dropdown-menu {
        transform: translateX(-50%) translateY(0);
    }
}</style>
<header class="site-header">
    <nav class="page-shell site-nav">
        <div class="brand">E-Service System</div>
        <div class="nav-links">
            <a href="{% url 'index' %}">Home</a>
            <a href="{% url 'about' %}">About</a>
            <a href="{% url 'contact' %}">Contact</a>
            {% if user.is_authenticated %}
                <a href="{% url 'services' %}">Services</a>
                <div class="user-dropdown">
                    <button class="user-dropdown-btn">
                        {{ user.get_full_name|default:user.username }}
                        <span class="dropdown-arrow">▼</span>
                    </button>
                    <div class="user-dropdown-menu">
                        <a href="{% url 'user_dashboard' %}">Dashboard</a>
                        <a href="{% url 'user_dashboard' %}">My Applications</a>
                        <a href="{% url 'logout' %}">Logout</a>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </nav>
</header>

<div class="page-shell">
    {% block content %}{% endblock %}
</div>

<footer class="footer page-shell">
    <p>© 2026 E-Service System. Crafted for role-based service workflows.</p>
</footer>
</body>
</html>
